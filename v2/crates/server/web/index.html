<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tenodera</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #2a3341;
    --text: #e6edf3; --muted: #8b98a9; --accent: #3b82f6; --accent-d: #2563eb;
    --ok: #2ea043; --warn: #d29922; --err: #f85149; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); }
  header { display: flex; align-items: center; gap: 12px; padding: 14px 22px;
    border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; }
  .logo { font-weight: 700; letter-spacing: .3px; font-size: 16px; }
  .logo b { color: var(--accent); }
  .spacer { flex: 1; }
  .who { color: var(--muted); font-size: 13px; }
  main { max-width: 960px; margin: 0 auto; padding: 24px 22px 60px; }
  h2 { font-size: 15px; margin: 26px 0 12px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px; }
  .card { background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; }
  input, button, select { font: inherit; }
  input { background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; outline: none; }
  input:focus { border-color: var(--accent); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 8px 14px; cursor: pointer; font-weight: 600; }
  button:hover { background: var(--accent-d); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); font-weight: 500; }
  button.ghost:hover { background: var(--panel2); }
  button.danger { background: transparent; border: 1px solid var(--err); color: var(--err); }
  button.danger:hover { background: rgba(248,81,73,.1); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .host { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; background: var(--panel); }
  .host-top { display: flex; align-items: center; gap: 10px; }
  .host-name { font-weight: 600; }
  .host-sub { color: var(--muted); font-size: 12.5px; }
  .badge { font-size: 11.5px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); }
  .badge.enrolled { color: var(--ok); border-color: var(--ok); }
  .ops { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
  pre.out { background: #0b0f14; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin: 10px 0 0; font-size: 12.5px; overflow-x: auto; white-space: pre-wrap;
    word-break: break-word; color: #b9c6d6; max-height: 220px; }
  .login-wrap { max-width: 360px; margin: 12vh auto 0; }
  .login-wrap input { width: 100%; margin-bottom: 10px; }
  .login-wrap button { width: 100%; }
  .err { color: var(--err); font-size: 13px; min-height: 18px; }
  .muted { color: var(--muted); }
  .hidden { display: none; }
  .perms { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .perm { font-size: 11px; padding: 1px 7px; border-radius: 6px; background: var(--panel2); color: var(--muted); }
  .grow { flex: 1; min-width: 120px; }
</style>
</head>
<body>
<header>
  <span class="logo">Tenoder<b>a</b></span>
  <span class="muted" style="font-size:12px">v2 control plane</span>
  <span class="spacer"></span>
  <span class="who" id="who"></span>
  <button class="ghost hidden" id="logoutBtn" onclick="logout()">Log out</button>
</header>

<!-- LOGIN -->
<div id="loginView" class="login-wrap">
  <div class="card">
    <h2 style="margin-top:0">Sign in</h2>
    <input id="u" placeholder="username" autocomplete="username" />
    <input id="p" type="password" placeholder="password" autocomplete="current-password" />
    <button onclick="login()">Sign in</button>
    <p class="err" id="loginErr"></p>
    <p class="muted" style="font-size:12px;margin:6px 0 0">Authenticated via PAM on the control plane.</p>
  </div>
</div>

<!-- APP -->
<main id="appView" class="hidden">
  <div class="card">
    <div class="row">
      <div class="grow">
        <div class="host-name">Signed in as <span id="meName"></span></div>
        <div class="perms" id="mePerms"></div>
      </div>
      <button class="ghost" onclick="verifyAudit()">Verify audit chain</button>
    </div>
    <pre class="out hidden" id="auditOut"></pre>
  </div>

  <h2>Add host</h2>
  <div class="card">
    <div class="row">
      <input id="hName" class="grow" placeholder="display name" />
      <input id="hHost" class="grow" placeholder="hostname / IP" />
      <input id="hPort" style="width:90px" placeholder="port" value="22" />
      <button onclick="addHost()">Register</button>
    </div>
    <p class="err" id="addErr"></p>
  </div>

  <h2>Hosts</h2>
  <div id="hosts"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let TOKEN = localStorage.getItem("tnd_token") || "";
let ME = null;

async function api(method, path, body) {
  const opt = { method, headers: {} };
  if (TOKEN) opt.headers["Authorization"] = "Bearer " + TOKEN;
  if (body !== undefined) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const res = await fetch(path, opt);
  let data = null;
  try { data = await res.json(); } catch (_) {}
  return { status: res.status, data };
}
const can = (perm) => ME && ME.permissions && ME.permissions.includes(perm);

async function login() {
  $("loginErr").textContent = "";
  const r = await api("POST", "/api/auth/login", { username: $("u").value, password: $("p").value });
  if (r.status === 200 && r.data.token) {
    TOKEN = r.data.token; localStorage.setItem("tnd_token", TOKEN);
    await boot();
  } else {
    $("loginErr").textContent = (r.data && r.data.error) || "login failed";
  }
}
async function logout() {
  await api("POST", "/api/auth/logout");
  TOKEN = ""; ME = null; localStorage.removeItem("tnd_token");
  render();
}

async function boot() {
  const r = await api("GET", "/api/me");
  if (r.status !== 200) { TOKEN = ""; localStorage.removeItem("tnd_token"); render(); return; }
  ME = r.data;
  render();
  await loadHosts();
}
function render() {
  const on = !!ME;
  $("loginView").classList.toggle("hidden", on);
  $("appView").classList.toggle("hidden", !on);
  $("logoutBtn").classList.toggle("hidden", !on);
  $("who").textContent = on ? ME.username : "";
  if (on) {
    $("meName").textContent = ME.username;
    $("mePerms").innerHTML = (ME.permissions || []).sort()
      .map((p) => `<span class="perm">${p}</span>`).join("");
  }
}

async function verifyAudit() {
  const o = $("auditOut"); o.classList.remove("hidden"); o.textContent = "…";
  const r = await api("GET", "/api/audit/verify");
  const v = r.data || {};
  o.textContent = r.status === 200
    ? `chain_valid: ${v.chain_valid}   events: ${v.events}`
    : `error: ${(v.error) || r.status}`;
}

async function addHost() {
  $("addErr").textContent = "";
  const port = parseInt($("hPort").value, 10) || 22;
  const r = await api("POST", "/api/hosts", { display_name: $("hName").value, hostname: $("hHost").value, port });
  if (r.status === 201) { $("hName").value = ""; $("hHost").value = ""; await loadHosts(); }
  else $("addErr").textContent = (r.data && r.data.error) || `failed (${r.status})`;
}

async function loadHosts() {
  const r = await api("GET", "/api/hosts");
  const list = (r.data && r.data.hosts) || [];
  $("hosts").innerHTML = list.length ? "" : `<p class="muted">No hosts yet.</p>`;
  for (const h of list) $("hosts").appendChild(hostCard(h));
}

function hostCard(h) {
  const el = document.createElement("div");
  el.className = "host";
  const enrolled = h.status === "enrolled";
  el.innerHTML = `
    <div class="host-top">
      <span class="host-name">${h.display_name}</span>
      <span class="badge ${enrolled ? "enrolled" : ""}">${h.status}</span>
      <span class="spacer" style="flex:1"></span>
      <span class="host-sub">${h.hostname}:${h.port}</span>
    </div>
    <div class="ops">
      <div class="row">
        <button class="ghost act" data-op="enroll">Enroll</button>
        <input class="unit grow" placeholder="unit (e.g. sshd.service)" />
        <button class="ghost act" data-op="service.status">Status</button>
        <button class="ghost act" data-op="service.start">Start</button>
        <button class="danger act" data-op="service.stop">Stop</button>
        <button class="danger act" data-op="service.restart">Restart</button>
      </div>
      <pre class="out hidden result"></pre>
    </div>`;
  const out = el.querySelector(".result");
  const unit = el.querySelector(".unit");
  el.querySelectorAll(".act").forEach((btn) => {
    btn.onclick = () => runOp(h, btn.dataset.op, unit.value.trim(), out);
  });
  return el;
}

async function runOp(host, op, unit, out) {
  out.classList.remove("hidden"); out.textContent = "…";
  if (op === "enroll") {
    // Re-enrolling an already-trusted host requires step-up.
    let body;
    if (host.status === "enrolled") {
      const pw = prompt(`Step-up: re-enter your password to re-enroll ${host.display_name} (replaces its pinned keys)`);
      if (pw === null) { out.textContent = "cancelled"; return; }
      body = { reauth: pw };
    }
    const r = await api("POST", `/api/hosts/${host.id}/enroll`, body);
    out.textContent = JSON.stringify(r.data, null, 2);
    if (r.status === 200) await loadHosts();
    return;
  }
  if (!unit) { out.textContent = "enter a unit name first"; return; }
  const body = { unit };
  // High-risk ops require step-up re-authentication.
  if (op === "service.stop" || op === "service.restart") {
    const pw = prompt(`Step-up: re-enter your password to ${op.split(".")[1]} ${unit}`);
    if (pw === null) { out.textContent = "cancelled"; return; }
    body.reauth = pw;
  }
  const r = await api("POST", `/api/hosts/${host.id}/${op}`, body);
  out.textContent = JSON.stringify(r.data, null, 2);
}

// boot
if (TOKEN) boot(); else render();
</script>
</body>
</html>
