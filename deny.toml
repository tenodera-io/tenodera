# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Enforced in CI (.github/workflows/ci.yml) across protocol/, panel/, agent/.

[advisories]
version = 2
# Fail on any crate pulled from a version yanked from crates.io.
yanked = "deny"
# RUSTSEC IDs to consciously ignore, with a reason. Keep this list short and justified.
ignore = [
    # rustls-pemfile is unmaintained (archived upstream), not vulnerable. Its PEM
    # parsing moved into rustls-pki-types; migrating off it is tracked separately.
    # No fixed release exists, so ignore rather than block CI on an unmaintained flag.
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses acceptable for an MIT-licensed project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    # Mozilla CA root store data shipped by webpki-roots.
    "CDLA-Permissive-2.0",
]

[bans]
# Multiple versions of the same crate are a warning, not a hard failure —
# transitive graphs commonly carry a few.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
