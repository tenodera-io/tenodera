# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Enforced in CI (.github/workflows/ci.yml) across protocol/, panel/, agent/.

[advisories]
version = 2
# Fail on any crate pulled from a version yanked from crates.io.
yanked = "deny"
# RUSTSEC IDs to consciously ignore, with a reason. Keep this empty by default.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses acceptable for an MIT-licensed project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]

[bans]
# Multiple versions of the same crate are a warning, not a hard failure —
# transitive graphs commonly carry a few.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
