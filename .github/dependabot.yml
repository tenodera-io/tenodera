version: 2
updates:
  # Rust crates — one entry per Cargo manifest (separate lockfiles).
  - package-ecosystem: cargo
    directory: "/protocol"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: "/panel"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: "/agent"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns: ["*"]

  # Frontend
  - package-ecosystem: npm
    directory: "/panel/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
