name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── .deb — built in a Debian 12 (bookworm) container ──────────────────────────
  # glibc is forward-compatible: a binary built against bookworm's glibc (2.36)
  # runs on Debian 12+ and Ubuntu 24.04+ (all newer glibc). Building on the
  # oldest supported target covers every newer one with a single artifact.
  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: debian:bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-24.04 }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev \
            libpam0g-dev dpkg-dev \
            curl ca-certificates git python3 xz-utils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp crate version from tag
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" \
            panel/Cargo.toml agent/Cargo.toml

      - name: Package agent (.deb)
        working-directory: agent
        run: make package-deb VERSION=${{ steps.version.outputs.version }}

      - name: Package gateway (.deb)
        working-directory: panel
        run: make package-deb VERSION=${{ steps.version.outputs.version }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          mv agent/*.deb panel/*.deb dist/
          cd dist
          # Version-less filenames so the release "latest/download/<file>" URL is
          # stable across releases. The version stays inside the package (dpkg -l)
          # and in the release title/changelog. underscore vs. hyphen keeps the
          # agent and panel globs disjoint.
          mv tenodera-agent_*.deb tenodera-agent_${{ matrix.arch }}.deb
          mv tenodera_*.deb tenodera_${{ matrix.arch }}.deb
          ls -l

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/*.deb
          if-no-files-found: error

  # ── .rpm — built in a Fedora container (native rpmbuild + PAM sonames) ─────────
  build-rpm:
    name: Build .rpm (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: fedora:43
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-24.04 }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
    steps:
      - name: Install build dependencies
        run: |
          dnf -y install \
            gcc gcc-c++ make pkgconf-pkg-config clang clang-devel \
            pam-devel rpm-build systemd-rpm-macros \
            curl ca-certificates git python3 xz findutils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp crate version from tag
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" \
            panel/Cargo.toml agent/Cargo.toml

      - name: Package agent (.rpm)
        working-directory: agent
        run: make package-rpm VERSION=${{ steps.version.outputs.version }}

      - name: Package gateway (.rpm)
        working-directory: panel
        run: make package-rpm VERSION=${{ steps.version.outputs.version }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          mv agent/*.rpm panel/*.rpm dist/
          cd dist
          # Version-less filenames for a stable latest/download URL (see .deb job).
          # rpmbuild names files <name>-<ver>-<rel>.<dist>.<arch>.rpm; drop all of
          # that but the name and arch. The panel name is followed by a digit,
          # the agent name by "agent-", so the two globs are disjoint.
          mv tenodera-agent-*.rpm tenodera-agent-${{ matrix.arch }}.rpm
          mv tenodera-[0-9]*.rpm tenodera-${{ matrix.arch }}.rpm
          ls -l

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/*.rpm
          if-no-files-found: error

  # ── Checksums, signature, and the GitHub Release ──────────────────────────────
  release:
    name: Sign and publish
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect packages
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' \) -exec cp -v {} dist/ \;
          echo "── packages ──"
          ls -l dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.deb *.rpm > SHA256SUMS

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Sign checksums
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — cannot sign the release."
            echo "::error::Generate a key with 'minisign -G', add the secret key as the"
            echo "::error::MINISIGN_SECRET_KEY repository secret, and put the public key in SECURITY.md."
            exit 1
          fi
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          printf '%s\n' "$MINISIGN_PASSWORD" | \
            minisign -S -s minisign.key -m SHA256SUMS \
              -t "Tenodera ${GITHUB_REF_NAME} — signed by CI"
          rm -f minisign.key
          echo "── signed ──"
          ls -l SHA256SUMS SHA256SUMS.minisig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tenodera ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig
          body: |
            ## Installation

            ### Panel (gateway + UI)
            ```bash
            curl -sSfL https://raw.githubusercontent.com/${{ github.repository }}/main/tenodera.sh | sudo bash
            ```

            ### Managed hosts (agent)
            ```bash
            curl -sSfL https://raw.githubusercontent.com/${{ github.repository }}/main/tenodera-agent.sh | sudo bash -s -- --gateway http://<panel-host>:9090
            ```

            ### Or download a package directly (amd64 / arm64)

            Asset filenames are version-less, so `releases/latest/download/…` always
            fetches the newest release. For a specific version, swap `latest` for the
            tag, e.g. `releases/download/${{ github.ref_name }}/tenodera_amd64.deb`.

            **Debian 12+ / Ubuntu 24.04+** — `.deb`:
            ```bash
            # panel host
            wget https://github.com/${{ github.repository }}/releases/latest/download/tenodera_amd64.deb
            wget https://github.com/${{ github.repository }}/releases/latest/download/tenodera-agent_amd64.deb
            sudo apt install ./tenodera_amd64.deb ./tenodera-agent_amd64.deb
            # managed host
            wget https://github.com/${{ github.repository }}/releases/latest/download/tenodera-agent_amd64.deb
            sudo apt install ./tenodera-agent_amd64.deb
            ```

            **Fedora / RHEL / openSUSE** — `.rpm`:
            ```bash
            # panel host
            sudo dnf install \
              https://github.com/${{ github.repository }}/releases/latest/download/tenodera-x86_64.rpm \
              https://github.com/${{ github.repository }}/releases/latest/download/tenodera-agent-x86_64.rpm
            # managed host
            sudo dnf install https://github.com/${{ github.repository }}/releases/latest/download/tenodera-agent-x86_64.rpm
            ```

            > arm64 / aarch64: swap `amd64` → `arm64` (.deb) and `x86_64` → `aarch64` (.rpm).

            ### Verifying the download

            All artifacts are checksummed in `SHA256SUMS`, which is signed with
            [minisign](https://jedisct1.github.io/minisign/). The public key is in
            [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md).
            ```bash
            minisign -Vm SHA256SUMS -P <public-key-from-SECURITY.md>
            sha256sum -c SHA256SUMS
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md)
            for full setup instructions and [THREAT_MODEL.md](https://github.com/${{ github.repository }}/blob/main/THREAT_MODEL.md)
            for the security model.
