name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-packages:
    name: Build packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            panel -> target
            agent -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: panel/ui/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libssl-dev libpam0g-dev libclang-dev \
            dpkg-dev

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build agent
        working-directory: agent
        run: cargo build --release

      - name: Build gateway + UI
        working-directory: panel
        run: |
          cargo build --release
          cd ui && npm ci && npm run build

      - name: Package agent (deb)
        working-directory: agent
        run: make package-deb VERSION=${{ steps.version.outputs.version }}

      - name: Package gateway (deb)
        working-directory: panel
        run: make package-deb VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tenodera ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            agent/tenodera-agent_${{ steps.version.outputs.version }}_amd64.deb
            panel/tenodera_${{ steps.version.outputs.version }}_amd64.deb
          body: |
            ## Installation

            ### Panel (gateway + UI)
            ```bash
            curl -sSfL https://raw.githubusercontent.com/${{ github.repository }}/main/tenodera.sh | sudo bash
            ```

            ### Managed hosts (agent)
            ```bash
            curl -sSfL https://raw.githubusercontent.com/${{ github.repository }}/main/tenodera-agent.sh | sudo bash -s -- --gateway http://<panel-host>:9090
            ```

            Or install the .deb packages directly:
            ```bash
            # Panel host
            sudo dpkg -i tenodera_${{ steps.version.outputs.version }}_amd64.deb

            # Managed hosts
            sudo dpkg -i tenodera-agent_${{ steps.version.outputs.version }}_amd64.deb
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
