name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust: format, lint, and test the three crates ─────────────────────────────
  # protocol/ (standalone), panel/ (workspace: gateway + pam-helper), agent/.
  # panel/protocol is a committed symlink to ../protocol, so cargo resolves it.
  rust:
    name: Rust · fmt · clippy · test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev libpam0g-dev

      - name: Install Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            protocol
            panel
            agent

      - name: rustfmt --check
        run: |
          for d in protocol panel agent; do
            echo "── fmt: $d ──"
            cargo fmt --manifest-path "$d/Cargo.toml" --all --check
          done

      - name: clippy (-D warnings)
        run: |
          for d in protocol panel agent; do
            echo "── clippy: $d ──"
            cargo clippy --manifest-path "$d/Cargo.toml" --all-targets -- -D warnings
          done

      - name: test
        run: |
          for d in protocol panel agent; do
            echo "── test: $d ──"
            cargo test --manifest-path "$d/Cargo.toml"
          done

  # ── UI: type-check (tsc -b) and bundle (vite build) ───────────────────────────
  ui:
    name: UI · typecheck · build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: panel/ui/package-lock.json
      - name: Build UI
        working-directory: panel/ui
        run: |
          npm ci
          npm run build

  # ── Supply chain: advisories + license policy (deny.toml) ─────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        manifest: [protocol/Cargo.toml, panel/Cargo.toml, agent/Cargo.toml]
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ${{ matrix.manifest }}
